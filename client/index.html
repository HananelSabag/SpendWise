<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="description" content="SpendWise - Advanced financial management platform with analytics, admin system, and intelligent insights" />

    <!-- Resolve the saved theme before the first paint. React used to learn the user's
         dark-mode preference only after auth hydration, which produced a white flash on
         cold loads (most visibly on /financial-cycle). -->
    <script>
      (function () {
        var root = document.documentElement;
        try {
          var theme = sessionStorage.getItem('spendwise-session-theme');
          if (!theme) {
            var cachedAuth = JSON.parse(localStorage.getItem('spendwise-auth') || '{}');
            var cachedUser = cachedAuth && cachedAuth.state && cachedAuth.state.user;
            theme = cachedUser && (cachedUser.theme_preference || cachedUser.themePreference);
          }
          var followsSystem = !theme || theme === 'auto' || theme === 'system';
          var dark = theme === 'dark' || (followsSystem && window.matchMedia('(prefers-color-scheme: dark)').matches);
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
          root.style.backgroundColor = dark ? '#030712' : '#f9fafb';
        } catch (e) {
          root.style.backgroundColor = '#f9fafb';
        }
        root.classList.add('sw-theme-ready');
      })();
    </script>
    
    <!-- iPhone/iOS Universal Links Support -->
    <meta name="apple-itunes-app" content="app-argument=spendwise://verify" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SpendWise" />
    
    <!-- Open Graph for better link previews -->
    <meta property="og:title" content="SpendWise - Financial Management Platform" />
    <meta property="og:description" content="Advanced financial management with analytics, admin dashboard, and Google OAuth integration" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://spendwise-app.vercel.app" />
    <meta property="og:image" content="https://spendwise-app.vercel.app/og-image.png" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://accounts.google.com" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function () {
        try {
          var lang = localStorage.getItem('spendwise-language') || 'en';
          var el = document.querySelector('link[rel="manifest"]');
          if (el && (lang === 'he' || lang === 'en')) {
            el.href = '/manifest.' + lang + '.json';
          }
        } catch (e) {}
      })();
    </script>
    
    <!-- Google Identity Services for OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <title>SpendWise - Financial Management Platform</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
